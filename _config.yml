# Site settings
title: White's Blog
tagline: "Web Scraping Specialist & Creative Builder"
description: "Web Scraping & Reverse Engineering 技术博客 — 专注逆向工程、JSVMP分析、验证码协议解析与自动化工具开发"
author: White
email: white@haloowhite.com
baseurl: ""
url: "https://haloowhite.com"
lang: zh-CN
twitter_username: holaawhite
github_username: HalooWhite

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/
theme: null

# Markdown processing
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    wrap: true
    line_numbers: false
    block:
      line_numbers: false
      wrap: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Collections
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:title/

# Custom variables
author_bio: "White is absolutely obsessed with Feynman—so much so that he chose Feynman as his avatar. He strives to present every complex concept in a straightforward, simple way. As a committed minimalist, he brings a passionate and curious spirit to life, immersing himself in reading and pursuing new experiences. Above all, White firmly believes no one has real limitations—time is the greatest lever of all. Don’t waste yours!"

# Social links
social:
  github: HalooWhite
  telegram: HalooWhite
  twitter: holaawhite

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
