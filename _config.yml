# Site settings
title: White's Blog
tagline: "Web Scraping Specialist & Creative Builder"
description: "Web Scraping & Reverse Engineering 技术博客 — 专注逆向工程、JSVMP分析、验证码协议解析与自动化工具开发"
author: White
email: white@haloowhite.com
baseurl: ""
url: "https://haloowhite.com"
lang: zh-CN
twitter_username: holaawhite
github_username: HalooWhite

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/
theme: null

# Markdown processing
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    wrap: true
    line_numbers: false
    block:
      line_numbers: false
      wrap: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Collections
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:title/

# Custom variables
author_bio: "我很喜欢费曼，并且我也坚信最好的学习方式是通过实践和分享。希望通过输出倒逼输入的形式，让我可以更专注我所感兴趣的任何东西，而不只是一知半解。"

# Social links
social:
  github: HalooWhite
  telegram: HalooWhite
  twitter: holaawhite

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
